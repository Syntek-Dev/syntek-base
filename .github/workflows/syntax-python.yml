name: Python — Lint, Format & Typecheck

on:
  push:
    branches: [main, staging, dev, testing]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - ".github/workflows/syntax-python.yml"
  pull_request:
    branches: [main, staging, dev, testing]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - ".github/workflows/syntax-python.yml"
  workflow_dispatch:

jobs:
  ruff-lint:
    name: Ruff — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --only-dev

      - name: Run Ruff lint
        run: uv run ruff check .

  ruff-format:
    name: Ruff — Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --only-dev

      - name: Check formatting
        run: uv run ruff format --check .

  basedpyright:
    name: basedpyright — Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run basedpyright
        run: uv run basedpyright
