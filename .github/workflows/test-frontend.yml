name: test-frontend

on:
  push:
    branches: [main, staging, dev, testing]
    paths:
      - "code/src/frontend/**"
      - "code/src/docker/frontend/Dockerfile.test"
      - "code/src/docker/docker-compose.test.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main, staging, dev, testing]
    paths:
      - "code/src/frontend/**"
      - "code/src/docker/frontend/Dockerfile.test"
      - "code/src/docker/docker-compose.test.yml"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  vitest:
    name: vitest + coverage
    runs-on: ubuntu-latest

    env:
      COMPOSE_FILE: code/src/docker/docker-compose.test.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend-test image
        run: docker compose -f $COMPOSE_FILE build frontend-test

      - name: Run vitest with coverage
        run: |
          mkdir -p reports
          docker compose -f $COMPOSE_FILE run --rm \
            -v "${{ github.workspace }}/reports:/workspace/code/src/frontend/coverage" \
            frontend-test \
            pnpm test:coverage

      - name: Set coverage threshold
        id: threshold
        run: |
          BRANCH="${{ github.base_ref || github.ref_name }}"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "staging" ]]; then
            echo "pct=80" >> $GITHUB_OUTPUT
          else
            echo "pct=75" >> $GITHUB_OUTPUT
          fi

      - name: Enforce coverage threshold
        env:
          COV_THRESHOLD: ${{ steps.threshold.outputs.pct }}
        run: |
          python3 - <<'EOF'
          import json, sys, os
          threshold = int(os.environ["COV_THRESHOLD"])
          try:
              d = json.load(open("reports/coverage-summary.json"))
              pct = int(float(d.get("total", {}).get("lines", {}).get("pct", 0)))
              print(f"Lines coverage: {pct}% (required: {threshold}%)")
              if pct < threshold:
                  print(f"FAIL: {pct}% is below the required {threshold}%")
                  sys.exit(1)
              print(f"PASS: {pct}% >= {threshold}%")
          except FileNotFoundError:
              print("FAIL: coverage-summary.json not found")
              sys.exit(1)
          except Exception as e:
              print(f"FAIL: {e}")
              sys.exit(1)
          EOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: reports/
          retention-days: 30

      - name: Tear down
        if: always()
        run: docker compose -f $COMPOSE_FILE down -v
