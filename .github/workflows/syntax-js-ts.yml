name: JS/TS — Lint & Format

on:
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.json"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.css"
      - "**/*.html"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "eslint.config.mjs"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/syntax-js-ts.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.json"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.css"
      - "**/*.html"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "eslint.config.mjs"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/syntax-js-ts.yml"
  workflow_dispatch:

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint:js

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check
