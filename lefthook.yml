pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      run: pnpm exec eslint {staged_files}

    prettier:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,yaml,yml,css,html,md,mdx}"
      run: pnpm exec prettier --check {staged_files}

    ruff-lint:
      glob: "*.py"
      run: uv run ruff check --force-exclude {staged_files}

    ruff-format:
      glob: "*.py"
      run: uv run ruff format --force-exclude --check {staged_files}

    basedpyright:
      glob: "*.py"
      run: uv run basedpyright

    markdownlint:
      glob: "*.md"
      run: pnpm exec markdownlint-cli2 {staged_files}
