# Development stack — full hot-reload, accessible at dev.syntekstudio.com
# Run from project root: docker compose -f code/src/docker/docker-compose.dev.yml up
# Required env vars: POSTGRES_PASSWORD, SECRET_KEY
# Optional: POSTGRES_USER (default: syntek)
name: syntek-dev

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: syntek_website_dev
      POSTGRES_USER: ${POSTGRES_USER:-syntek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syntek} -d syntek_website_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cache:
    image: valkey/valkey:8-alpine
    command: valkey-server --save 20 1 --loglevel warning
    volumes:
      - valkey_dev_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  maildev:
    image: maildev/maildev:latest
    ports:
      - "127.0.0.1:1080:1080" # Web UI — http://localhost:1080
    restart: unless-stopped

  backend:
    build:
      context: ../../..
      dockerfile: code/src/docker/backend/Dockerfile.dev
    volumes:
      - ../backend:/workspace/code/src/backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgresql://${POSTGRES_USER:-syntek}:${POSTGRES_PASSWORD}@db:5432/syntek_website_dev
      REDIS_URL: redis://cache:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      EMAIL_HOST: maildev
      EMAIL_PORT: "1025"
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../../..
      dockerfile: code/src/docker/frontend/Dockerfile.dev
    volumes:
      - ../frontend:/workspace/code/src/frontend
      # Preserve container node_modules from being overwritten by the source mount
      - /workspace/node_modules
    environment:
      NODE_ENV: development
      HOSTNAME: "0.0.0.0"
      # Browser-side: relative path so requests go via nginx
      NEXT_PUBLIC_GRAPHQL_URL: /graphql/
      # SSR-side: direct to backend within Docker network
      GRAPHQL_INTERNAL_URL: http://backend:8000/graphql/
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_dev_data:
  valkey_dev_data:
