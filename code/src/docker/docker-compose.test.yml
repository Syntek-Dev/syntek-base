# Test stack — automated testing, accessible at test.syntekstudio.com
# Run from project root: docker compose -f code/src/docker/docker-compose.test.yml up --abort-on-container-exit
# Backend tests exit with pytest's exit code; frontend tests exit with vitest's exit code.
name: syntek-test

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: syntek_website_test
      POSTGRES_USER: ${POSTGRES_USER:-syntek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test_password_change_me}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syntek} -d syntek_website_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  cache:
    image: valkey/valkey:8-alpine
    command: valkey-server --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  maildev:
    image: maildev/maildev:latest

  backend-test:
    build:
      context: ../../..
      dockerfile: code/src/docker/backend/Dockerfile.test
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgresql://${POSTGRES_USER:-syntek}:${POSTGRES_PASSWORD:-test_password_change_me}@db:5432/syntek_website_test
      REDIS_URL: redis://cache:6379/0
      SECRET_KEY: ${SECRET_KEY:-test-secret-key-not-for-production}
      EMAIL_HOST: maildev
      EMAIL_PORT: "1025"
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
    volumes:
      - ../scripts/tests/reports:/workspace/code/src/scripts/tests/reports:rw
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  frontend-test:
    build:
      context: ../../..
      dockerfile: code/src/docker/frontend/Dockerfile.test
    environment:
      NODE_ENV: test
      NEXT_PUBLIC_GRAPHQL_URL: http://nginx/graphql/
    volumes:
      - ../scripts/tests/reports:/workspace/code/src/scripts/tests/reports:rw
    depends_on:
      - backend-test

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/test.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-test
      - frontend-test

volumes:
  postgres_test_data:
