upstream django_backend {
    server backend:8000;
}

upstream nextjs_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name dev.projectname.com;

    client_max_body_size 20M;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Django: GraphQL endpoint (supports WebSocket subscriptions)
    location /graphql/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Hardcoded https mirrors what CF Tunnel sends in staging/prod — keeps Django
        # request.is_secure(), CSRF_COOKIE_SECURE, and SESSION_COOKIE_SECURE consistent.
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Django: admin panel
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django: collected static files
    location /static/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django: media uploads
    location /media/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django: health check
    location /health/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Next.js: HMR WebSocket (must come before the catch-all)
    location /_next/webpack-hmr {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js: everything else
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
